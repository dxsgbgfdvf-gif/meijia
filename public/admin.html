<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>预约管理 · 奶油指尖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">奶油指尖</a>
      <nav>
        <a href="/" class="nav-link">首页</a>
      </nav>
    </div>
  </header>

  <main class="container admin-page">
    <div class="section-title">
      <h2>预约管理</h2>
      <span class="subtitle">查看与管理顾客预约</span>
    </div>

    <div id="login-section">
      <div class="login-card">
        <label class="form-label" for="admin-password">管理密码</label>
        <p class="form-hint">默认密码：meijia2025（可在环境变量 ADMIN_PASSWORD 修改）</p>
        <input type="password" id="admin-password" class="text-input" placeholder="请输入管理密码" />
        <button type="button" class="btn-primary" id="btn-login" style="width:100%;margin-top:20px">进入后台</button>
      </div>
    </div>

    <div id="admin-section" class="hidden">
      <div class="notification-card" id="notification-card">
        <div>
          <strong>新预约提醒</strong>
          <p id="notification-status">后台打开时会自动检查新预约</p>
        </div>
        <button type="button" class="btn-mini" id="btn-enable-notification">开启提醒</button>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="num" id="stat-total">0</div>
          <div class="label">全部预约</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-today">0</div>
          <div class="label">今日预约</div>
        </div>
      </div>

      <label class="form-label" for="filter-date">按日期筛选</label>
      <input type="date" id="filter-date" class="date-input" style="margin-bottom:20px" />

      <div id="bookings-list"></div>
      <div id="empty-state" class="empty-state hidden">
        <p>暂无预约记录</p>
      </div>

      <button type="button" class="btn-secondary" id="btn-logout" style="width:100%;margin-top:24px">退出登录</button>

      <section class="works-admin-section">
        <div class="section-title">
          <h2>店铺设置</h2>
          <span class="subtitle">前台文案与须知可在这里直接修改</span>
        </div>
        <div class="works-admin-form">
          <label class="form-label" for="setting-store-name">店名</label>
          <input type="text" id="setting-store-name" class="text-input" />

          <label class="form-label" for="setting-hero-badge" style="margin-top:14px">首页徽标文案</label>
          <input type="text" id="setting-hero-badge" class="text-input" />

          <label class="form-label" for="setting-hero-title" style="margin-top:14px">首页主标题</label>
          <input type="text" id="setting-hero-title" class="text-input" />

          <label class="form-label" for="setting-hero-subtitle" style="margin-top:14px">首页副标题（英文）</label>
          <input type="text" id="setting-hero-subtitle" class="text-input" />

          <label class="form-label" for="setting-hero-desc" style="margin-top:14px">首页介绍</label>
          <textarea id="setting-hero-desc" class="textarea-input"></textarea>

          <label class="form-label" for="setting-booking-notice" style="margin-top:14px">预约页提示</label>
          <textarea id="setting-booking-notice" class="textarea-input"></textarea>

          <label class="form-label" for="setting-booking-success" style="margin-top:14px">预约成功提示</label>
          <textarea id="setting-booking-success" class="textarea-input"></textarea>

          <label class="form-label" for="setting-works-intro" style="margin-top:14px">作品页介绍</label>
          <textarea id="setting-works-intro" class="textarea-input"></textarea>

          <label class="form-label" for="setting-special-open" style="margin-top:14px">可预约时间段（每行一条，必须带日期）</label>
          <textarea id="setting-special-open" class="textarea-input" placeholder="格式：2026-05-30 14:30-16:00"></textarea>
          <p class="form-hint">前台只会显示你这里写过的日期与时间段。</p>

          <label class="form-label" for="setting-contact-title" style="margin-top:14px">底部联系标题</label>
          <input type="text" id="setting-contact-title" class="text-input" placeholder="如：有问题直接联系我" />

          <label class="form-label" for="setting-contact-wechat" style="margin-top:14px">微信号</label>
          <input type="text" id="setting-contact-wechat" class="text-input" placeholder="如：nail_studio_01" />

          <label class="form-label" for="setting-contact-phone" style="margin-top:14px">联系电话（选填）</label>
          <input type="text" id="setting-contact-phone" class="text-input" placeholder="如：13800138000" />

          <label class="form-label" for="setting-contact-note" style="margin-top:14px">联系提示文案</label>
          <textarea id="setting-contact-note" class="textarea-input" placeholder="如：截图款式发我微信，回复更快"></textarea>

          <label class="form-label" for="setting-contact-qr" style="margin-top:14px">微信好友码（图片）</label>
          <input type="file" id="setting-contact-qr" accept="image/jpeg,image/jpg,image/png,image/webp" />
          <p class="form-hint">上传后会显示在预约页底部固定联系区。</p>

          <label class="form-label" for="setting-rules" style="margin-top:14px">店铺须知（每行一条）</label>
          <textarea id="setting-rules" class="textarea-input" placeholder="每行一条规则"></textarea>

          <div class="form-nav">
            <button type="button" class="btn-secondary" id="btn-setting-reload">重新读取</button>
            <button type="button" class="btn-primary" id="btn-setting-save">保存设置</button>
          </div>
        </div>
      </section>

      <section class="works-admin-section">
        <div class="section-title">
          <h2>服务项目管理</h2>
          <span class="subtitle">可新增、编辑、上下架前台价目与预约项目</span>
        </div>
        <div class="works-admin-form">
          <input type="hidden" id="service-id" />
          <label class="form-label" for="service-category">分类</label>
          <input type="text" id="service-category" class="text-input" placeholder="如：本甲" />

          <label class="form-label" for="service-name" style="margin-top:14px">项目名称</label>
          <input type="text" id="service-name" class="text-input" placeholder="如：纯色" />

          <label class="form-label" for="service-price" style="margin-top:14px">价格</label>
          <input type="text" id="service-price" class="text-input" placeholder="如：49.9" />

          <label class="form-label" for="service-suffix" style="margin-top:14px">价格后缀（选填）</label>
          <input type="text" id="service-suffix" class="text-input" placeholder="如：起" />

          <label class="form-label" for="service-sort" style="margin-top:14px">排序</label>
          <input type="number" id="service-sort" class="text-input" value="0" />

          <label class="checkbox-row">
            <input type="checkbox" id="service-active" checked />
            <span>前台展示</span>
          </label>

          <div class="form-nav">
            <button type="button" class="btn-secondary" id="btn-service-reset">重置</button>
            <button type="button" class="btn-primary" id="btn-service-save">保存项目</button>
          </div>
        </div>

        <div id="services-list" class="works-admin-list"></div>
        <div id="services-empty" class="empty-state hidden">
          <p>还没有项目，先新增一条吧</p>
        </div>
      </section>

      <section class="works-admin-section">
        <div class="section-title">
          <h2>作品管理</h2>
          <span class="subtitle">新增、编辑与上下架作品展示</span>
        </div>

        <div class="works-admin-form">
          <input type="hidden" id="work-id" />
          <label class="form-label" for="work-title">作品名称</label>
          <input type="text" id="work-title" class="text-input" placeholder="如：裸粉猫眼" />

          <label class="form-label" for="work-tag" style="margin-top:14px">标签</label>
          <input type="text" id="work-tag" class="text-input" placeholder="如：纯欲显白" />

          <label class="form-label" for="work-description" style="margin-top:14px">介绍</label>
          <textarea id="work-description" class="textarea-input" placeholder="一句话介绍这款作品特点"></textarea>

          <label class="form-label" for="work-sort" style="margin-top:14px">排序</label>
          <input type="number" id="work-sort" class="text-input" placeholder="数字越小越靠前" value="0" />

          <label class="form-label" for="work-image-input" style="margin-top:14px">作品图片</label>
          <input type="file" id="work-image-input" accept="image/jpeg,image/jpg,image/png,image/webp" />
          <p class="form-hint">不选新图则保留旧图，编辑时可点“清空图片”移除。</p>

          <label class="checkbox-row">
            <input type="checkbox" id="work-active" checked />
            <span>上架展示</span>
          </label>

          <div class="form-nav">
            <button type="button" class="btn-secondary" id="btn-work-reset">重置</button>
            <button type="button" class="btn-primary" id="btn-work-save">保存作品</button>
          </div>
          <button type="button" class="btn-delete" id="btn-work-clear-image" style="display:none">清空图片</button>
        </div>

        <div id="works-list" class="works-admin-list"></div>
        <div id="works-empty" class="empty-state hidden">
          <p>还没有作品，先新增一条吧</p>
        </div>
      </section>
    </div>
  </main>

  <div class="error-toast" id="toast"></div>

  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="查看大图">
    <button type="button" class="lightbox-backdrop" id="lightbox-backdrop" aria-label="关闭"></button>
    <button type="button" class="lightbox-close" id="lightbox-close" aria-label="关闭">×</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="参考图大图" />
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
